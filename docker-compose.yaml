services:
  postgres:
    image: postgres:18
    container_name: tigers_postgres
    environment:
      POSTGRES_USER: tigers_user
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: tigers
    ports:
      - "5433:5432"
    volumes:
      - tigers_pg_data:/var/lib/postgresql

  metabase:
    image: metabase/metabase:latest
    container_name: tigers_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - tigers_mb_data:/metabase-data
    depends_on:
      - postgres

volumes:
  tigers_pg_data:
  tigers_mb_data: